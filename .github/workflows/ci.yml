name: ci

on:
  push:
  pull_request:

jobs:
  drop-in-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify drop-in matches skills/
        run: ./scripts/check-drop-in-sync.sh

  validate-state-fixtures:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: All valid fixtures must pass
        run: |
          set -euo pipefail
          for f in skills/after-hours-loop/fixtures/sample-state.valid.json \
                   skills/after-hours-loop/fixtures/sample-state.valid-*.json; do
            [[ -e "$f" ]] || continue
            echo "expect ok: $f"
            python3 scripts/validate-state.py "$f"
          done
      - name: All invalid fixtures must fail
        run: |
          set -euo pipefail
          for f in skills/after-hours-loop/fixtures/sample-state.invalid-*.json; do
            echo "expect fail: $f"
            if python3 scripts/validate-state.py "$f"; then
              echo "expected non-zero exit for $f" >&2
              exit 1
            fi
          done
